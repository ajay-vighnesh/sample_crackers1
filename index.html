document.getElementById('crackerForm').addEventListener('submit', function (e) {
  e.preventDefault();

  const fileInput = document.getElementById("crackerImage");
  const file = fileInput.files[0];

  if (!file) {
    alert("Please choose an image");
    return;
  }

  const formData = new FormData();
  formData.append("name", document.getElementById("crackerName").value);
  formData.append("price", document.getElementById("crackerPrice").value);
  formData.append("category_id", document.getElementById("categoryAccordion").value);
  formData.append("product_image", file);

  
    console.log("FormData:", [...formData.entries()]); // DEBUG
    console.log(document.getElementById("crackerImage").files,'cracker fils');


  fetch('/api/crackers', {
      method: 'POST',
      body: formData    // ✅ IMPORTANT — NO HEADERS HERE
  })
  .then(res => res.json())
  .then(() => {
      alert("Cracker saved!");
      document.getElementById('crackerForm').reset();
      loadCategories();
  })
  .catch(err => console.error(err));
});


  async function loadCategories() {
  const response = await fetch('/api/categories');
  const categories = await response.json();

  const container = document.getElementById('categoryAccordion');
  container.innerHTML = '<option value="">-- Select Category --</option>'; 

  categories.forEach(cat => {
    const option = document.createElement("option");
    option.value = cat.id;   // or cat.name, depending on your DB
    option.textContent = cat.name;
    container.appendChild(option);
  });
}

// Run on page load
loadCategories();



  async function createCategory() {
    const name = document.getElementById('categoryName').value.trim();
    if (!name) {
      alert("⚠️ Please enter a category name");
      return;
    }

    try {
      const response1 = await fetch('/api/categories', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });

      const data = await response1.json();

      if (!response1.ok) {
        throw new Error(data.error || 'Failed to save category');
      }

      alert('✅ Category added successfully');
      document.getElementById('categoryForm').reset();
      loadCategories(); // <-- Assuming you have this function defined

    } catch (err) {
      alert('❌ Failed to save category: ' + err.message);
      console.error('Error:', err);
    }
  }
